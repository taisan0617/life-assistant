openapi: "3.0.0"
info:
  title: Weather Action API
  version: "1.0.0"
  description: |
    Provides current weather information for a given city.
    Used by the life-assistant Bedrock Agent action group.

paths:
  /getCurrentWeather:
    get:
      operationId: getCurrentWeather
      summary: Get current weather for a city
      description: >
        Returns current weather data including temperature, humidity,
        wind speed, and a short description for the specified city.
        City names must be provided in English.
      parameters:
        - name: city
          in: query
          required: true
          description: City name in English (e.g. Tokyo, Yokohama, Nagano)
          schema:
            type: string
            example: Tokyo
      responses:
        "200":
          description: Weather data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  city:
                    type: string
                    description: City name as returned by the API
                  country:
                    type: string
                    description: ISO 3166-1 alpha-2 country code
                  temperature:
                    type: number
                    description: Current temperature in Celsius
                  feels_like:
                    type: number
                    description: Perceived (feels-like) temperature in Celsius
                  humidity:
                    type: integer
                    description: Relative humidity in percent
                  description:
                    type: string
                    description: Short weather description in Japanese
                  wind_speed:
                    type: number
                    description: Wind speed in m/s
        "400":
          description: Bad request (missing or invalid city parameter)
        "500":
          description: Internal server error
